name: deploy-docs

env:
  IMPORT_PATH: "*.md"
  DEPLOY_HOST: /opt/docker-app/html/docs

concurrency:
  group: deploy-production
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 拉取代码
      - uses: actions/checkout@v5

      # 配置 SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            Port ${{ secrets.VPS_PORT }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking yes
          EOF

          ssh-keyscan -T 10 -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} 2>/dev/null >> ~/.ssh/known_hosts

      # 部署
      - name: Upload files
        run: |
          rsync -azv --delete --itemize-changes \
            -e ssh \
            ${{ env.IMPORT_PATH }} \
            vps:${{ env.DEPLOY_HOST }}/
       